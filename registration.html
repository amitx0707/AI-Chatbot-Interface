<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - MintAI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="registration-page">
    <header class="site-header">
        <div class="brand">
            <div class="logo">M</div>
            <div class="title">
                <span class="name">MintAI</span>
                <span class="tag">Chat</span>
            </div>
        </div>
        <nav class="top-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        </nav>
    </header>

    <main class="auth-hero">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="auth-subtitle">Join MintAI and start chatting with advanced AI models</p>

            <form id="registrationForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Your full name"
                        required
                        minlength="2"
                    >
                    <span class="error-msg"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        required
                    >
                    <span class="error-msg"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Min 8 characters, 1 number, 1 symbol"
                        required
                        minlength="8"
                    >
                    <span class="error-msg"></span>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter your password"
                        required
                    >
                    <span class="error-msg"></span>
                </div>

                <div class="form-group checkbox">
                    <input 
                        type="checkbox" 
                        id="terms" 
                        name="terms" 
                        required
                    >
                    <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                    <span class="error-msg"></span>
                </div>

                <button type="submit" class="btn primary btn-full">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; <span id="year"></span> MintAI. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const form = document.getElementById('registrationForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthBar = document.querySelector('.strength-bar');
        const strengthText = document.querySelector('.strength-text');

        // Password strength checker
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            const feedback = [];

            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthBar.style.width = (strength * 20) + '%';
            
            if (strength < 2) {
                strengthBar.style.backgroundColor = '#ff4444';
                strengthText.textContent = 'Weak';
            } else if (strength < 4) {
                strengthBar.style.backgroundColor = '#ffaa00';
                strengthText.textContent = 'Fair';
            } else {
                strengthBar.style.backgroundColor = '#44ff44';
                strengthText.textContent = 'Strong';
            }
        });

        // Form validation
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;

            // Clear previous errors
            document.querySelectorAll('.error-msg').forEach(msg => msg.textContent = '');

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const terms = document.getElementById('terms').checked;

            // Full name validation
            if (fullName.length < 2) {
                document.getElementById('fullName').parentElement.querySelector('.error-msg').textContent = 'Name must be at least 2 characters';
                isValid = false;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('email').parentElement.querySelector('.error-msg').textContent = 'Please enter a valid email';
                isValid = false;
            }

            // Password validation
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[a-zA-Z\d!@#$%^&*]{8,}$/;
            if (!passwordRegex.test(password)) {
                document.getElementById('password').parentElement.querySelector('.error-msg').textContent = 'Password must have 8+ chars, uppercase, lowercase, number, and symbol';
                isValid = false;
            }

            // Confirm password validation
            if (password !== confirmPassword) {
                document.getElementById('confirmPassword').parentElement.querySelector('.error-msg').textContent = 'Passwords do not match';
                isValid = false;
            }

            // Terms validation
            if (!terms) {
                document.getElementById('terms').parentElement.querySelector('.error-msg').textContent = 'You must agree to the terms';
                isValid = false;
            }

            if (isValid) {
                // Store user data (in real app, would send to server)
                const userData = { fullName, email, registeredAt: new Date().toISOString() };
                localStorage.setItem('mintai_user', JSON.stringify(userData));
                
                // Show success message
                alert('Registration successful! Redirecting to chat...');
                setTimeout(() => {
                    window.location.href = 'chat.html?user=' + encodeURIComponent(fullName);
                }, 1500);
            }
        });
    </script>
</body>
</html>
